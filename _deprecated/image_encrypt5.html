        const correctPass = "iloveramandrem";  // Secret passphrase

        const canvas = document.getElementById('img');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = encryptAndShowNoise;
        img.src = base64Image;

        function derive(pass) {
            let hash = 0;
            for (let i = 0; i < pass.length; i++) {
                hash = (hash * 31 + pass.charCodeAt(i)) & 0xffffffff;
            }
            const key = new Uint32Array(8);
            for (let i = 0; i < 8; i++) key[i] = hash = (hash * 1664525 + 1013904223) & 0xffffffff;
            return new Uint8Array(key.buffer);
        }

        function encryptAndShowNoise() {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const bytes = new Uint8Array(data.data.buffer);
            const key = derive(correctPass);

            for (let i = 0; i < bytes.length; i += 4) {
                bytes[i] ^= key[(i / 4) % 32];       // R
                bytes[i + 1] ^= key[(i / 4 + 1) % 32];   // G
                bytes[i + 2] ^= key[(i / 4 + 2) % 32];   // B
            }

            data.data.set(bytes);
            ctx.putImageData(data, 0, 0);
        }

        function decrypt() {
            const pass = document.getElementById('pass').value.trim();
            if (!pass) return;

            encryptAndShowNoise();  // Restart from encrypted

            const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const bytes = new Uint8Array(data.data.buffer);
            const key = derive(pass);

            for (let i = 0; i < bytes.length; i += 4) {
                bytes[i] ^= key[(i / 4) % 32];       // R
                bytes[i + 1] ^= key[(i / 4 + 1) % 32];   // G
                bytes[i + 2] ^= key[(i / 4 + 2) % 32];   // B
            }

            data.data.set(bytes);
            ctx.putImageData(data, 0, 0);
        }
